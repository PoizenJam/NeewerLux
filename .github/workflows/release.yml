# Build and release NeewerLux Windows executable
# Triggered when a version tag (v*) is pushed
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# This creates a GitHub Release with:
#   - NeewerLux-{version}-win64.zip  (PyInstaller onedir build)
#   - NeewerLux-{version}-source.zip (auto-generated by GitHub)

name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6>=6.5.0 bleak>=0.21.0 pyinstaller>=6.0

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: pyinstaller NeewerLux.spec

      - name: Copy light_prefs to build
        run: |
          xcopy /E /I /Y "light_prefs" "dist\NeewerLux\light_prefs"

      - name: Copy assets to build
        run: |
          copy "com.github.poizenjam.NeewerLux.png" "dist\NeewerLux\"
          copy "com.github.poizenjam.NeewerLux.ico" "dist\NeewerLux\"

      - name: Create release zip
        shell: bash
        run: |
          cd dist
          mv NeewerLux "NeewerLux-${{ steps.version.outputs.VERSION }}-win64"
          7z a -tzip "../NeewerLux-${{ steps.version.outputs.VERSION }}-win64.zip" \
            "NeewerLux-${{ steps.version.outputs.VERSION }}-win64/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NeewerLux v${{ steps.version.outputs.VERSION }}
          body: |
            ## NeewerLux v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download `NeewerLux-${{ steps.version.outputs.VERSION }}-win64.zip`
            2. Extract to any folder
            3. Run `NeewerLux.exe`

            Preset and animation files are in the `light_prefs/` folder and can be edited manually.

            ### Running from source
            Requires Python 3.10+, PySide6, and bleak:
            ```
            pip install PySide6 bleak
            python NeewerLux.py
            ```

            See [CHANGELOG.md](CHANGELOG.md) for full release notes.
          files: |
            NeewerLux-${{ steps.version.outputs.VERSION }}-win64.zip
          draft: false
          prerelease: false
