# Build NeewerLux Windows EXE on release tag push
# Creates a GitHub Release with:
#   - NeewerLux-<version>-Windows.zip  (PyInstaller --onedir EXE + light_prefs/)
#   - NeewerLux-<version>-Source.zip   (Python source distribution)

name: Build Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write  # Needed to create releases

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 bleak pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller NeewerLux.spec

      - name: Copy light_prefs into dist
        run: |
          Copy-Item -Path "light_prefs" -Destination "dist/NeewerLux/light_prefs" -Recurse
          Copy-Item -Path "README.md" -Destination "dist/NeewerLux/"
          Copy-Item -Path "CHANGELOG.md" -Destination "dist/NeewerLux/"

      - name: Create EXE zip
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Compress-Archive -Path "dist/NeewerLux/*" -DestinationPath "NeewerLux-${version}-Windows.zip"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: NeewerLux-*-Windows.zip

  build-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          zip -r "NeewerLux-${VERSION}-Source.zip" \
            NeewerLux.py \
            neewerlux_ui.py \
            neewerlux_theme.py \
            neewerlux_webui.py \
            neewerlux_anim_editor.py \
            NeewerLux.bat \
            NeewerLux-HTTP.bat \
            com.github.poizenjam.NeewerLux.desktop \
            com.github.poizenjam.NeewerLux.ico \
            com.github.poizenjam.NeewerLux.png \
            README.md \
            CHANGELOG.md \
            light_prefs/

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: NeewerLux-*-Source.zip

  create-release:
    needs: [build-windows-exe, build-source]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            NeewerLux-*-Windows.zip
            NeewerLux-*-Source.zip
